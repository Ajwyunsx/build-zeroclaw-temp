name: Build zeroclaw aarch64

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild

      - name: Clone zeroclaw v0.7.5
        run: git clone --depth 1 --branch v0.7.5 https://github.com/zeroclaw-labs/zeroclaw.git

      - name: Build static binary with zig
        run: |
          cd zeroclaw
          cargo zigbuild --release --target aarch64-unknown-linux-musl

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64
          path: zeroclaw/target/aarch64-unknown-linux-musl/release/zeroclaw
