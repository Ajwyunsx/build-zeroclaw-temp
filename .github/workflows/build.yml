name: Build zeroclaw aarch64

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Install cross-compiler
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Clone zeroclaw v0.7.5
        run: git clone --depth 1 --branch v0.7.5 https://github.com/zeroclaw-labs/zeroclaw.git

      - name: Build
        run: |
          cd zeroclaw
          rustup target add aarch64-unknown-linux-gnu
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc cargo build --release --target aarch64-unknown-linux-gnu -j2

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64
          path: zeroclaw/target/aarch64-unknown-linux-gnu/release/zeroclaw
