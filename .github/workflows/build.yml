name: Build zeroclaw aarch64

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Clone zeroclaw v0.7.5
        run: git clone --depth 1 --branch v0.7.5 https://github.com/zeroclaw-labs/zeroclaw.git

      - name: Build static binary
        run: |
          cd zeroclaw
          cargo build --release --target aarch64-unknown-linux-musl

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-aarch64
          path: zeroclaw/target/aarch64-unknown-linux-musl/release/zeroclaw
